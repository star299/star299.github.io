<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>网址导航</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="shortcut icon" href="images/logo.ico" />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/font-awesome.min.css">
  <link rel="stylesheet" href="./css/nprogress.css" />
  <link rel="stylesheet" href="./css/index.css" />
</head>

<body>
  <div class="container" id="container">
    <div class="left-bar">
      <div class="title">
        <h1>网址导航</h1>
      </div>
      <!-- 分类导航菜单 -->
      <div class="nav">
        <div class="home active item">
          <a href="javascript:void(0);">
            <i class="fa fa-book fa-2x" aria-hidden="true"></i> 导航分类
          </a>
          <i class="hairlines"></i>
        </div>

        <div class="nav-item">
          <div class="category-nav" id="category">
            <ul>
              <!-- 导航栏分类渲染 -->
              <script id="CategoryId" type="text/html">
                  {{each list value index}}
                      <li id="{{value.Category_id}}" class="{{index==0 ? 'active' : ''}}">
                          <a data-id="{{value.Category_id}}">
                              <i data-id="{{value.Category_id}}" class="fa {{value.category_icon}}"></i> {{value.category_CN}}
                          </a>
                      </li>
                  {{/each}}
              </script>
            </ul>
          </div>
        </div>
      </div>

      <!-- github -->
      <div class="my-link item">
        <a href="" id="mygithub">
          <i class="fa fa-github fa-2x"></i>
        </a>
      </div>
    </div>

    <!-- 主体内容 -->
    <div class="main" id="mainWrap">
      <div id="mainContent">
        <!-- 分类选项卡模板 -->
        <script id="navItemId" type="text/html">
            {{each list value index}}
            <div class="itemCart" id="{{value.category_item}}">
                <div class="sub-category">
                    <div>
                        <i class="fa {{value.category_icon}}"></i>
                        {{value.category_CN}}
                    </div>
                </div>
                <div>
                    {{each value.item_children value index}}
                    <a target="_blank" href="{{value.a_href}}">
                        <div class="item">
                            <div class="logo">
                                <img width="100%" class="loaded lazy" data-echo="{{value.img_src}}" src="./images/loading.gif">
                                <span>{{value.child_name}}</span>
                            </div>
                            <div class="desc">
                                {{value.child_desc}}
                            </div>
                        </div>
                    </a>
                    {{/each}}
                </div>
            </div>
            {{/each}}
          </script>
      </div>

      <!-- 尾部 -->
      <div class="footer">
        <div class="copyright">
          <div>
            Copyright © 2019
            <a href="javascript:void(0);"> 导航</a>
          </div>
        </div>
      </div>
    </div>

    <!-- 返回顶部 -->
    <a href="javascript:;" class="goTop">
      <img src="./images/goTop.png" alt="返回顶部">
    </a>

    <!-- 统计 -->
    <div style="width: 0; height: 0; overflow: hidden;">
      <!-- 统计代码 -->
    </div>
  </div>

</body>
<script src="./js/jquery-1.12.4.min.js"></script>
<script src="./js/echo.min.js"></script>
<script src="./js/template-web.js"></script>
<script src="./js/nprogress.js"></script>
<script src="./js/index.js"></script>

</html>
